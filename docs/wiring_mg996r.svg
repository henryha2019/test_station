<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 470" width="680" role="img">
  <title>MG996R servo test station — wiring</title>
  <desc>Host PC over USB serial to Arduino Uno and ESP32+OLED, and over Wi-Fi to ESP32-CAM. Uno sends PWM on D9 to the MG996R; servo power is high-side through INA219 from a separate 5-6V (>=3A) supply; AS5600 and INA219 share the Uno I2C bus (A4/A5), AS5600=0x36, INA219=0x40. All nodes share ground. ESP32-CAM is separately 5V powered and images the servo through the diffuser shroud lit by 5V white LEDs.</desc>
  <style>
    text { font-family: 'Segoe UI', Arial, sans-serif; }
    .th { font-size: 14px; font-weight: 600; }
    .t  { font-size: 14px; }
    .ts { font-size: 12px; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="680" height="470" fill="#ffffff"/>

  <!-- Host -->
  <rect x="270" y="40" width="140" height="46" rx="12" fill="#F1EFE8" stroke="#5F5E5A"/>
  <text class="th" x="340" y="62" text-anchor="middle" fill="#2C2C2A">Host PC (Python)</text>
  <text class="ts" x="340" y="78" text-anchor="middle" fill="#5F5E5A">owns verdict · CSV</text>

  <!-- Host fan-out -->
  <line x1="295" y1="86" x2="122" y2="149" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="87" x2="340" y2="149" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="385" y1="86" x2="558" y2="149" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="212" y="104" text-anchor="end"   fill="#5F5E5A">USB · serial</text>
  <text class="ts" x="348" y="116" text-anchor="start" fill="#5F5E5A">Wi-Fi · JPEG</text>
  <text class="ts" x="470" y="104" text-anchor="start" fill="#5F5E5A">USB · serial</text>

  <!-- Row A: instruments -->
  <rect x="45" y="150" width="150" height="50" rx="12" fill="#E6F1FB" stroke="#185FA5"/>
  <text class="th" x="120" y="170" text-anchor="middle" fill="#0C447C">Arduino Uno</text>
  <text class="ts" x="120" y="186" text-anchor="middle" fill="#0C447C">servo functional test</text>

  <rect x="265" y="150" width="150" height="50" rx="12" fill="#E1F5EE" stroke="#0F6E56"/>
  <text class="th" x="340" y="170" text-anchor="middle" fill="#085041">ESP32-CAM</text>
  <text class="ts" x="340" y="186" text-anchor="middle" fill="#085041">capture image</text>

  <rect x="485" y="150" width="150" height="50" rx="12" fill="#EEEDFE" stroke="#534AB7"/>
  <text class="th" x="560" y="170" text-anchor="middle" fill="#3C3489">ESP32 + OLED</text>
  <text class="ts" x="560" y="186" text-anchor="middle" fill="#3C3489">station HMI</text>

  <!-- Row B -->
  <rect x="30" y="252" width="120" height="50" rx="12" fill="#E6F1FB" stroke="#185FA5"/>
  <text class="th" x="90" y="272" text-anchor="middle" fill="#0C447C">MG996R</text>
  <text class="ts" x="90" y="288" text-anchor="middle" fill="#0C447C">DUT · servo</text>

  <rect x="170" y="252" width="120" height="50" rx="12" fill="#E6F1FB" stroke="#185FA5"/>
  <text class="th" x="230" y="272" text-anchor="middle" fill="#0C447C">AS5600 + INA219</text>
  <text class="ts" x="230" y="288" text-anchor="middle" fill="#0C447C">angle · current</text>

  <rect x="265" y="320" width="150" height="46" rx="12" fill="#E1F5EE" stroke="#0F6E56"/>
  <text class="th" x="340" y="342" text-anchor="middle" fill="#085041">Diffuser shroud</text>
  <text class="ts" x="340" y="358" text-anchor="middle" fill="#085041">+ DUT + LEDs</text>

  <rect x="485" y="252" width="150" height="46" rx="12" fill="#EEEDFE" stroke="#534AB7"/>
  <text class="th" x="560" y="274" text-anchor="middle" fill="#3C3489">SSD1306 OLED</text>
  <text class="ts" x="560" y="290" text-anchor="middle" fill="#3C3489">I²C 21/22</text>

  <!-- Power -->
  <rect x="30" y="372" width="260" height="44" rx="12" fill="#FAEEDA" stroke="#854F0B"/>
  <text class="th" x="160" y="392" text-anchor="middle" fill="#633806">External 5–6 V supply ≥3 A</text>
  <text class="ts" x="160" y="408" text-anchor="middle" fill="#633806">servo (via INA219) · CAM · LEDs · common GND</text>

  <!-- Connectors: Uno -> servo / sensors -->
  <line x1="100" y1="200" x2="92"  y2="251" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="60"  y="228" text-anchor="start" fill="#5F5E5A">D9 PWM</text>
  <line x1="150" y1="200" x2="222" y2="251" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="200" y="222" text-anchor="start" fill="#5F5E5A">I²C A4/A5</text>
  <line x1="90"  y1="302" x2="170" y2="276" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="96"  y="316" text-anchor="start" fill="#5F5E5A">3-pin plug</text>

  <!-- CAM -> shroud (optical) -->
  <line x1="340" y1="200" x2="340" y2="319" stroke="#1D9E75" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text class="ts" x="348" y="250" text-anchor="start" fill="#0F6E56">optical</text>

  <!-- ESP32 -> OLED -->
  <line x1="560" y1="200" x2="560" y2="251" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="566" y="228" text-anchor="start" fill="#5F5E5A">I²C 21/22</text>

  <!-- Power feeds -->
  <line x1="160" y1="372" x2="200" y2="302" stroke="#854F0B" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text class="ts" x="118" y="350" text-anchor="start" fill="#633806">5–6V→INA219</text>
  <line x1="270" y1="372" x2="330" y2="346" stroke="#854F0B" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text class="ts" x="288" y="368" text-anchor="start" fill="#633806">5V LEDs</text>

  <!-- Legend -->
  <rect x="45"  y="430" width="12" height="12" rx="2" fill="#E6F1FB" stroke="#185FA5"/>
  <text class="ts" x="62"  y="440" text-anchor="start" fill="#5F5E5A">Functional</text>
  <rect x="165" y="430" width="12" height="12" rx="2" fill="#E1F5EE" stroke="#0F6E56"/>
  <text class="ts" x="182" y="440" text-anchor="start" fill="#5F5E5A">Vision</text>
  <rect x="255" y="430" width="12" height="12" rx="2" fill="#EEEDFE" stroke="#534AB7"/>
  <text class="ts" x="272" y="440" text-anchor="start" fill="#5F5E5A">HMI</text>
  <rect x="320" y="430" width="12" height="12" rx="2" fill="#FAEEDA" stroke="#854F0B"/>
  <text class="ts" x="337" y="440" text-anchor="start" fill="#5F5E5A">Power</text>
  <text class="ts" x="410" y="440" text-anchor="start" fill="#5F5E5A">Dashed = optical · ★ all GND common</text>
</svg>
