<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 333" width="680" role="img">
<title>MG996R servo tester -- physical assembly (illustrative, pre-measurement)</title>
<desc>Isometric sketch: a baseplate carries a servo nest with 3-2-1 locating and a poka-yoke feature, holding an MG996R clamped by a manual toggle clamp. A 3-pin female header on the nest wall mates the servo plug -- no pogo pins. A magnet coupler on the servo output shaft sits under an AS5600 board mounted on a coaxial bridge spanning two posts. An electronics tray to the right carries the ESP32 (or ESP32-CAM used as a plain MCU), the INA219 current sensor, and the DC power input. An OLED front panel faces the operator. This is illustrative only, drawn before physical measurement or printing -- dimensions are not to scale.</desc>
